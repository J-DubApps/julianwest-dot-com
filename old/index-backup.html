      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

        s.textContent = await r.text();

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

stagram<\u002Fspan>\n    <span class=\"kind\">instagram.com / mrjdub<\u002Fspan>\n    <span class=\"arrow\"><\u002Fspan>\n  <\u002Fa>\n\n  <a class=\"row reveal\" href=\"mailto:the@julianwest.com\">\n    <span class=\"num mono\">07 —<\u002Fspan>\n    <span class=\"label\">Email<\u002Fspan>\n    <span class=\"kind\">the@julianwest.com<\u002Fspan>\n    <span class=\"arrow\"><\u002Fspan>\n  <\u002Fa>\n<\u002Fsection>\n\n<footer class=\"foot\">\n  <div class=\"left mono\">© 2026 Julian West<\u002Fdiv>\n  <div class=\"mid mono\">Made by a nerd · Dallas, TX<\u002Fdiv>\n  <div class=\"right mono\">v1.0<\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Tweaks -->\n<aside class=\"tweaks\" id=\"tweaks\" aria-hidden=\"true\">\n  <h3>Tweaks <span class=\"mono\" style=\"opacity:.5\">JW<\u002Fspan><\u002Fh3>\n\n  <div class=\"row-t\">\n    <label for=\"tw-mono\">Monogram size<\u002Flabel>\n    <span class=\"val\" id=\"tw-mono-val\">38<\u002Fspan>\n  <\u002Fdiv>\n  <input id=\"tw-mono\" type=\"range\" min=\"22\" max=\"60\" step=\"1\">\n\n  <div class=\"row-t\">\n    <label for=\"tw-motion\">Motion intensity<\u002Flabel>\n    <span class=\"val\" id=\"tw-motion-val\">5<\u002Fspan>\n  <\u002Fdiv>\n  <input id=\"tw-motion\" type=\"range\" min=\"0\" max=\"10\" step=\"1\">\n\n  <div class=\"row-t\">\n    <label>Theme default<\u002Flabel>\n    <span class=\"seg\" role=\"tablist\">\n      <button data-theme-pref=\"system\">Auto<\u002Fbutton>\n      <button data-theme-pref=\"light\">Light<\u002Fbutton>\n      <button data-theme-pref=\"dark\">Dark<\u002Fbutton>\n    <\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"row-t\">\n    <label>Marks<\u002Flabel>\n    <span class=\"seg\" role=\"tablist\">\n      <button data-ticks=\"on\">On<\u002Fbutton>\n      <button data-ticks=\"off\">Off<\u002Fbutton>\n    <\u002Fspan>\n  <\u002Fdiv>\n<\u002Faside>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"monogramVw\": 22,\n    \"motion\": 4,\n    \"themeDefault\": \"system\",\n    \"ticks\": \"on\"\n  }/*EDITMODE-END*/;\n\n  // ---------- Theme ----------\n  const mq = window.matchMedia('(prefers-color-scheme: dark)');\n  function resolveTheme(pref) {\n    if (pref === 'system') return mq.matches ? 'dark' : 'light';\n    return pref;\n  }\n  function applyTheme(pref) {\n    const theme = resolveTheme(pref);\n    document.documentElement.setAttribute('data-theme', theme);\n    const label = document.getElementById('themeLabel');\n    if (label) label.textContent = theme === 'dark' ? 'Dark' : 'Light';\n  }\n\n  let themePref = localStorage.getItem('jw-theme-pref') || TWEAK_DEFAULTS.themeDefault || 'system';\n  applyTheme(themePref);\n  mq.addEventListener('change', () => { if (themePref === 'system') applyTheme('system'); });\n\n  document.getElementById('themeToggle').addEventListener('click', () => {\n    const cur = document.documentElement.getAttribute('data-theme');\n    themePref = cur === 'dark' ? 'light' : 'dark';\n    localStorage.setItem('jw-theme-pref', themePref);\n    applyTheme(themePref);\n    syncTweakButtons();\n  });\n\n  // ---------- Scroll reveal ----------\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach((e, i) => {\n      if (e.isIntersecting) {\n        const els = document.querySelectorAll('.reveal:not(.in)');\n        const idx = Array.from(els).indexOf(e.target);\n        e.target.style.transitionDelay = (Math.max(0, idx) * 60) + 'ms';\n        e.target.classList.add('in');\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // ---------- Tweaks ----------\n  const state = { ...TWEAK_DEFAULTS };\n  const tweaks = document.getElementById('tweaks');\n\n  function applyMonogram(v) {\n    document.documentElement.style.setProperty('--mono-vw', v + 'vw');\n    const el = document.querySelector('.monogram');\n    if (el) el.style.fontSize = `clamp(140px, ${v}vw, 620px)`;\n    const m = document.getElementById('tw-mono-val'); if (m) m.textContent = v;\n  }\n  function applyMotion(v) {\n    const root = document.documentElement;\n    const scale = v / 5; // 1 is default\n    root.style.setProperty('--motion-scale', scale.toString());\n    document.body.style.setProperty('animation-duration', '');\n    // Override keyframe durations via CSS vars\n    document.querySelectorAll('.monogram .j, .monogram .w').forEach(el => {\n      el.style.animationDuration = (1400 / Math.max(0.4, scale)) + 'ms';\n      if (v === 0) { el.style.animation = 'none'; el.style.transform = 'translateX(0)'; el.style.opacity = 1; }\n    });\n    const m = document.getElementById('tw-motion-val'); if (m) m.textContent = v;\n  }\n  function applyTicks(v) {\n    document.querySelectorAll('.tick').forEach(t => t.style.display = v === 'off' ? 'none' : '');\n  }\n\n  function syncTweakButtons() {\n    document.querySelectorAll('[data-theme-pref]').forEach(b => b.classList.toggle('on', b.dataset.themePref === state.themeDefault));\n    document.querySelectorAll('[data-ticks]').forEach(b => b.classList.toggle('on', b.dataset.ticks === state.ticks));\n  }\n\n  function applyAll() {\n    applyMonogram(state.monogramVw);\n    applyMotion(state.motion);\n    applyTicks(state.ticks);\n    document.getElementById('tw-mono').value = state.monogramVw;\n    document.getElementById('tw-motion').value = state.motion;\n    syncTweakButtons();\n  }\n  applyAll();\n\n  function persist(partial) {\n    Object.assign(state, partial);\n    try {\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*');\n    } catch(_) {}\n  }\n\n  document.getElementById('tw-mono').addEventListener('input', (e) => {\n    const v = +e.target.value;\n    applyMonogram(v);\n    persist({ monogramVw: v });\n  });\n  document.getElementById('tw-motion').addEventListener('input', (e) => {\n    const v = +e.target.value;\n    applyMotion(v);\n    persist({ motion: v });\n  });\n  document.querySelectorAll('[data-theme-pref]').forEach(b => {\n    b.addEventListener('click', () => {\n      const pref = b.dataset.themePref;\n      themePref = pref;\n      localStorage.setItem('jw-theme-pref', pref);\n      applyTheme(pref);\n      persist({ themeDefault: pref });\n    });\n  });\n  document.querySelectorAll('[data-ticks]').forEach(b => {\n    b.addEventListener('click', () => {\n      applyTicks(b.dataset.ticks);\n      persist({ ticks: b.dataset.ticks });\n    });\n  });\n\n  // ---------- Edit mode host integration ----------\n  window.addEventListener('message', (ev) => {\n    const d = ev.data || {};\n    if (d.type === '__activate_edit_mode') {\n      tweaks.classList.add('open');\n      tweaks.setAttribute('aria-hidden', 'false');\n    } else if (d.type === '__deactivate_edit_mode') {\n      tweaks.classList.remove('open');\n      tweaks.setAttribute('aria-hidden', 'true');\n    }\n  });\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(_) {}\n\n  // ---------- Monogram post-animation dim ----------\n  // After the J/W slide-in settles (1400ms anim + 200ms delay ≈ 1600ms),\n  // ease the color toward a softer charcoal (light) / light-grey (dark),\n  // so the monogram recedes a touch into the background.\n  setTimeout(() => {\n    const m = document.querySelector('.monogram');\n    if (m) m.classList.add('dim');\n  }, 1700);\n\n  // ---------- Auto-scroll (idle) + Auto-redirect (time-based) ----------\n  // Auto-scroll: 10s after load, IF the user hasn't meaningfully interacted yet.\n  // Auto-redirect: 45s after load, UNCONDITIONAL — cancelled only if the user\n  //   clicks a menu link (at which point they've clearly gotten where they want).\n  //   The blog itself contains the same links, so sending idle visitors there is fine.\n  (function() {\n    const SCROLL_AT_MS            = 10000;\n    const SCROLL_DURATION_MS      = 2600; // slow, inertial feel — independent of hardware\n    const REDIRECT_AT_MS          = 30000;\n    const REDIRECT_URL            = 'https://blog.julianwest.me';\n    const MOUSE_MOVE_THRESHOLD_PX = 40; // ignore incidental cursor drift\n\n    // ----- Auto-scroll (cancellable by meaningful interaction) -----\n    let scrollCancelled = false;\n    let autoScrolling   = false;\n    let lastMouse       = null;\n    let mouseTravel     = 0;\n\n    function cancelScroll() {\n      if (scrollCancelled) return;\n      scrollCancelled = true;\n      window.removeEventListener('wheel',       onRealInteract, true);\n      window.removeEventListener('touchstart',  onRealInteract, true);\n      window.removeEventListener('pointerdown', onRealInteract, true);\n      window.removeEventListener('keydown',     onRealInteract, true);\n      window.removeEventListener('scroll',      onScroll,       true);\n      window.removeEventListener('mousemove',   onMouseMove,    true);\n    }\n\n    function onRealInteract() { cancelScroll(); }\n\n    function onScroll() {\n      if (autoScrolling) return; // our own smooth-scroll shouldn't self-cancel\n      cancelScroll();\n    }\n\n    function onMouseMove(e) {\n      if (lastMouse) {\n        const dx = e.clientX - lastMouse.x;\n        const dy = e.clientY - lastMouse.y;\n        mouseTravel += Math.hypot(dx, dy);\n        if (mouseTravel >= MOUSE_MOVE_THRESHOLD_PX) cancelScroll();\n      }\n      lastMouse = { x: e.clientX, y: e.clientY };\n    }\n\n    window.addEventListener('wheel',       onRealInteract, { capture: true, passive: true });\n    window.addEventListener('touchstart',  onRealInteract, { capture: true, passive: true });\n    window.addEventListener('pointerdown', onRealInteract, { capture: true, passive: true });\n    window.addEventListener('keydown',     onRealInteract, true);\n    window.addEventListener('scroll',      onScroll,       { capture: true, passive: true });\n    window.addEventListener('mousemove',   onMouseMove,    { capture: true, passive: true });\n\n    // Custom eased scroll — iOS-style inertial curve, consistent across machines.\n    // easeOutExpo gives a fast-ish takeoff and a long, soft settle.\n    function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }\n\n    function glide(toY, duration) {\n      const fromY    = window.scrollY;\n      const distance = toY - fromY;\n      if (Math.abs(distance) < 1) return;\n      const start = performance.now();\n\n      function frame(now) {\n        if (scrollCancelled) { autoScrolling = false; return; }\n        const t = Math.min(1, (now - start) / duration);\n        window.scrollTo(0, fromY + distance * easeOutExpo(t));\n        if (t < 1) requestAnimationFrame(frame);\n        else autoScrolling = false;\n      }\n      autoScrolling = true;\n      requestAnimationFrame(frame);\n    }\n\n    setTimeout(() => {\n      if (scrollCancelled) return;\n      const target = document.querySelector('.index');\n      if (target) {\n        const y = target.getBoundingClientRect().top + window.scrollY;\n        glide(y, SCROLL_DURATION_MS);\n      }\n    }, SCROLL_AT_MS);\n\n    // ----- Auto-redirect (decoupled; only cancelled by clicking a menu link) -----\n    let redirectCancelled = false;\n\n    const redirectTimer = setTimeout(() => {\n      if (redirectCancelled) return;\n      // Don't yank a backgrounded tab to the blog\n      if (document.hidden) return;\n      window.location.href = REDIRECT_URL;\n    }, REDIRECT_AT_MS);\n\n    // Clicking any menu link → user is navigating themselves, cancel the redirect.\n    document.querySelectorAll('.index a.row, .chrome a').forEach(a => {\n      a.addEventListener('click', () => {\n        redirectCancelled = true;\n        clearTimeout(redirectTimer);\n      });\n    });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
